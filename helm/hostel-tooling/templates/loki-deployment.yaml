{{- if .Values.loki.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hostel-tooling.lokiFullname" . }}
  labels:
    {{- include "hostel-tooling.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hostel-tooling.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: loki
  template:
    metadata:
      labels:
        {{- include "hostel-tooling.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loki
    spec:
      serviceAccountName: {{ include "hostel-tooling.lokiFullname" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.loki.podSecurityContext | nindent 8 }}
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: {{ .Values.loki.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.loki.securityContext | nindent 12 }}
          args:
            - -config.file=/etc/loki/loki.yml
          ports:
            - name: http
              containerPort: 3100
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yml
              subPath: loki.yml
            - name: data
              mountPath: /loki
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "hostel-tooling.lokiFullname" . }}-config
        - name: data
          {{- if .Values.loki.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hostel-tooling.lokiFullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
