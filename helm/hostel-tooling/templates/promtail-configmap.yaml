{{- if and .Values.promtail.enabled .Values.loki.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hostel-tooling.promtailFullname" . }}-config
  labels:
    {{- include "hostel-tooling.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
data:
  promtail.yml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://{{ include "hostel-tooling.lokiFullname" . }}:{{ .Values.loki.service.port }}/loki/api/v1/push

    scrape_configs:
      - job_name: hostel-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
          - regex:
              expression: '.*metric (?P<metric_name>hostel_request_(?:ttft|total)_seconds)\{entrypoint="(?P<entrypoint>[^"]+)",agent="(?P<agent>[^"]+)"\} (?P<metric_value>[0-9.]+)'
          - labels:
              metric_name:
              entrypoint:
              agent:
        relabel_configs:
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
            regex: hostel
          - target_label: job
            replacement: hostel-pods
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_instance
            target_label: release
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_component
            target_label: component
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            replacement: /var/log/pods/*$1/*.log
            target_label: __path__
{{- end }}
