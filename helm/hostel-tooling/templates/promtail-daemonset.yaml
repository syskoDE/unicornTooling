{{- if and .Values.promtail.enabled .Values.loki.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "hostel-tooling.promtailFullname" . }}
  labels:
    {{- include "hostel-tooling.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
spec:
  selector:
    matchLabels:
      {{- include "hostel-tooling.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: promtail
  template:
    metadata:
      labels:
        {{- include "hostel-tooling.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: promtail
    spec:
      serviceAccountName: {{ include "hostel-tooling.promtailFullname" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.promtail.podSecurityContext | nindent 8 }}
      containers:
        - name: promtail
          image: "{{ .Values.promtail.image.repository }}:{{ .Values.promtail.image.tag }}"
          imagePullPolicy: {{ .Values.promtail.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.promtail.securityContext | nindent 12 }}
          args:
            - -config.file=/etc/promtail/promtail.yml
          ports:
            - name: http-metrics
              containerPort: 3101
          volumeMounts:
            - name: config
              mountPath: /etc/promtail/promtail.yml
              subPath: promtail.yml
            - name: run
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
          resources:
            {{- toYaml .Values.promtail.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "hostel-tooling.promtailFullname" . }}-config
        - name: run
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
{{- end }}
