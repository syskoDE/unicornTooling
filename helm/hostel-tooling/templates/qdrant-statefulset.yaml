{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hostel-tooling.qdrantFullname" . }}
  labels:
    {{- include "hostel-tooling.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "hostel-tooling.qdrantFullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "hostel-tooling.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "hostel-tooling.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      serviceAccountName: {{ include "hostel-tooling.qdrantFullname" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.qdrant.podSecurityContext | nindent 8 }}
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.qdrant.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
      {{- if not .Values.qdrant.persistence.enabled }}
      volumes:
        - name: qdrant-storage
          emptyDir: {}
      {{- end }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
        {{- if .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ .Values.qdrant.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
