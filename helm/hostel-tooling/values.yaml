nameOverride: ""
fullnameOverride: ""

qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6333
    grpcPort: 6334
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  serviceAccount:
    create: true
    annotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  networkPolicy:
    enabled: true
    allowFromNamespacePods:
      matchLabels: {}
    allowFromWorkloads: []
    extraIngressFrom: []
  resources: {}

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  serviceAccount:
    create: true
    annotations: {}
  podSecurityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  networkPolicy:
    enabled: true
    allowFromNamespacePods:
      matchLabels: {}
    extraIngressFrom: []
  resources: {}

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  admin:
    existingSecret: ""
    userKey: admin-user
    passwordKey: admin-password
    user: admin
    password: replace-me
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
  serviceAccount:
    create: true
    annotations: {}
  podSecurityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  networkPolicy:
    enabled: true
    allowFromNamespacePods:
      matchLabels: {}
    extraIngressFrom: []
  resources: {}

monitoring:
  kubeStateMetrics:
    enabled: false
    namespace: kube-state-metrics
    serviceName: kube-state-metrics
    port: 8080
